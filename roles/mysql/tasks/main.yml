---
- name: Install MySQL server
  ansible.builtin.apt:
    name: mysql-server
    state: present

- name: Ensure MySQL is running and enabled
  ansible.builtin.service:
    name: mysql
    state: started
    enabled: true

# Debian/Ubuntu gotcha: root authenticates via unix socket, not password.
# Without login_unix_socket these tasks fail with "Access denied for user 'root'".
- name: Create application database
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Create application user
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  no_log: true                     # never print the password in the run output
