---
- name: Install Apache
  ansible.builtin.apt:
    name: apache2
    state: present

- name: Ensure web root exists
  ansible.builtin.file:
    path: "{{ web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy virtual host from template     # Day 35: one template, per-host values
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: /etc/apache2/sites-available/day40.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Enable day40 site
  ansible.builtin.command: a2ensite day40
  args:
    creates: /etc/apache2/sites-enabled/day40.conf   # Day 30: guard command for idempotency
  notify: Restart Apache

- name: Disable default site
  ansible.builtin.command: a2dissite 000-default
  args:
    removes: /etc/apache2/sites-enabled/000-default.conf
  notify: Restart Apache

- name: Ensure Apache is running and enabled
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true
